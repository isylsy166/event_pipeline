services:
  postgres:
    image: postgres:16-alpine
    container_name: event_pipeline_db
    environment:
      POSTGRES_DB: event_pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d event_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: event_pipeline_app
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  visualizer:
    build:
      context: .
      dockerfile: analysis/Dockerfile
    container_name: event_pipeline_visualizer
    working_dir: /app
    volumes:
      - ./analysis:/app/analysis
    command: python analysis/visualize.py
    environment:
      DB_HOST: postgres
    depends_on:
      app:
        condition: service_completed_successfully

volumes:
  postgres_data: